            gallery.innerHTML = '';
            dots.innerHTML = '';

            const firstFour = products.slice(0, 4);
            firstFour.forEach((p, i) => {
                const slide = document.createElement('div');
                slide.className = 'gallery-slide';
                slide.style.backgroundImage = `url('${p.images[0]}')`;
                slide.innerHTML = `
                    <div class="gallery-slide-content">
                        <div style="font-size: 14px; color: rgba(255,255,255,0.9); margin-bottom: 12px;">${p.name}</div>
                        <div class="gallery-slide-price">${p.price}₽</div>
                        <button class="gallery-cart-btn" onclick="openProductPage(${i})">Смотреть</button>
                    </div>
                `;
                gallery.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = `gallery-dot ${i === 0 ? 'active' : ''}`;
                dot.onclick = () => setGallerySlide(i);
                dots.appendChild(dot);
            });
        }

        // RENDER CATALOG
        function renderCatalog() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            products.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'product-card fade-up';
                card.innerHTML = `
                    <div class="product-img-wrap">
                        <img class="product-img" src="${p.images[0]}" alt="${p.name}">
                        <button class="wish-btn ${wishlist.includes(p.id) ? 'liked' : ''}" onclick="toggleWish(${p.id})">
                            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        </button>
                    </div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price}₽</div>
                `;
                card.onclick = (e) => {
                    if (!e.target.closest('.wish-btn')) openProductPage(products.indexOf(p));
                };
                grid.appendChild(card);
            });
        }

        // RENDER ADMIN LIST
        function renderAdminList() {
            // Функция не требуется для главного сайта
        }

        // PRODUCT PAGE
        function openProductPage(index) {
            if (!products[index]) return;
            currentProduct = products[index];
            currentProductIndex = 0;
            const modal = document.getElementById('productPage');
            modal.classList.add('open');
            
            document.getElementById('ppTitle').textContent = currentProduct.name;
            document.getElementById('ppPrice').textContent = currentProduct.price + '₽';
            document.getElementById('ppDesc').textContent = currentProduct.description || '';
            document.getElementById('ppMainPhoto').src = currentProduct.images[0];

            const sizesDiv = document.getElementById('ppSizes');
            sizesDiv.innerHTML = '';
            currentProduct.sizes.forEach(size => {
                const btn = document.createElement('button');
                btn.className = 'pp-size-btn';
                btn.textContent = size;
                btn.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.pp-size-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    btn.dataset.selected = 'true';
                };
                sizesDiv.appendChild(btn);
            });

            const wishBtn = document.getElementById('ppWishBtn');
            if (wishlist.includes(currentProduct.id)) {
                wishBtn.classList.add('liked');
            } else {
                wishBtn.classList.remove('liked');
            }
        }

        function closeProductPage() {
            document.getElementById('productPage').classList.remove('open');
        }

        function nextProductPhoto() {
            if (!currentProduct) return;
            currentProductIndex = (currentProductIndex + 1) % currentProduct.images.length;
            document.getElementById('ppMainPhoto').src = currentProduct.images[currentProductIndex];
        }

        function prevProductPhoto() {
            if (!currentProduct) return;
            currentProductIndex = (currentProductIndex - 1 + currentProduct.images.length) % currentProduct.images.length;
            document.getElementById('ppMainPhoto').src = currentProduct.images[currentProductIndex];
        }

        // CART
        function addToCart() {
            if (!currentProduct) return;
            const sizeBtn = document.querySelector('.pp-size-btn.selected');
            const size = sizeBtn ? sizeBtn.textContent : 'Стандартный';
            
            cart.push({
                id: currentProduct.id + Math.random(),
                productId: currentProduct.id,
                name: currentProduct.name,
                price: currentProduct.price,
                image: currentProduct.images[0],
                size: size
            });

            updateCart();
            closeProductPage();
            alert('Товар добавлен в корзину!');
        }

        function updateCart() {
            const badge = document.getElementById('cartBadge');
            badge.textContent = cart.length;
            if (cart.length > 0) badge.classList.remove('hidden');

            const body = document.getElementById('cartBody');
            body.innerHTML = '';

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img class="cart-item-img" src="${item.image}" alt="">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-meta">Размер: ${item.size}</div>
                        <div class="cart-item-price">${item.price}₽</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${index})">✕</button>
                `;
                body.appendChild(div);
            });

            document.getElementById('cartTotal').textContent = total + '₽';
            document.getElementById('checkoutTotal').textContent = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function openCart() {
            document.getElementById('cartSidebar').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
        }

        // WISH
        function toggleWish(productId = null) {
            const id = productId || (currentProduct ? currentProduct.id : null);
            if (!id) return;

            const idx = wishlist.indexOf(id);
            if (idx === -1) {
                wishlist.push(id);
            } else {
                wishlist.splice(idx, 1);
            }

            updateWish();
            renderCatalog();
            if (currentProduct) {
                const wishBtn = document.getElementById('ppWishBtn');
                if (wishlist.includes(currentProduct.id)) {
                    wishBtn.classList.add('liked');
                } else {
                    wishBtn.classList.remove('liked');
                }
            }
        }

        function updateWish() {
            const badge = document.getElementById('wishBadge');
            badge.textContent = wishlist.length;
            if (wishlist.length > 0) badge.classList.remove('hidden');

            const body = document.getElementById('wishBody');
            body.innerHTML = '';

            wishlist.forEach(id => {
                const product = products.find(p => p.id === id);
                if (!product) return;
                
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img class="cart-item-img" src="${product.images[0]}" alt="">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">${product.price}₽</div>
                    </div>
                    <button class="cart-item-remove" onclick="toggleWish(${product.id})">✕</button>
                `;
                body.appendChild(div);
            });
        }

        function openWish() {
            document.getElementById('wishSidebar').classList.add('open');
        }

        function closeWish() {
            document.getElementById('wishSidebar').classList.remove('open');
        }

        // CHECKOUT
        function openCheckout() {
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            document.getElementById('checkoutModal').classList.add('open');
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('open');
        }

        function updateDeliveryFields() {
            const type = document.getElementById('deliveryType').value;
            const fields = document.getElementById('deliveryFields');
            fields.innerHTML = '';

            if (type === 'courier') {
                fields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Адрес доставки</label>
                        <input type="text" class="form-input" id="courierAddress" placeholder="Ул., дом, квартира" required>
                    </div>
                `;
            } else if (type === 'pvz') {
                fields.innerHTML = `
                    <div id="pvzPickerHere"></div>
                `;
                if (window.initPvzSearch) {
                    window.initPvzSearch();
                }
            }
        }

        async function submitOrder(e) {
            e.preventDefault();

            if (cart.length === 0) {
                alert('Корзина пуста!');
                return;
            }

            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const email = document.getElementById('orderEmail').value;
            const deliveryType = document.getElementById('deliveryType').value;

            let deliveryInfo = '';
            if (deliveryType === 'courier') {
                deliveryInfo = document.getElementById('courierAddress').value;
            } else if (deliveryType === 'pvz') {
                if (!window.selectedPvz) {
                    alert('Выберите пункт выдачи');
                    return;
                }
                deliveryInfo = window.selectedPvz.address;
            }

            const orderData = {
                id: Date.now(),
                name,
                phone,
                email,
                deliveryType,
                deliveryInfo,
                items: cart.map(c => `${c.name} (${c.size}) - ${c.price}₽`),
                total: cart.reduce((sum, c) => sum + c.price, 0),
                date: new Date().toLocaleString('ru-RU')
            };

            // SEND TO TELEGRAM
            try {
                const text = `
🆕 НОВЫЙ ЗАКАЗ #${orderData.id}

👤 Имя: ${name}
📱 Телефон: ${phone}
📧 Email: ${email || 'не указан'}

🚚 Доставка: ${deliveryType === 'courier' ? 'Курьер' : 'ПВЗ'}
📍 Адрес: ${deliveryInfo}

📦 Товары:
${orderData.items.map((item, i) => `${i+1}. ${item}`).join('\n')}

💰 Итого: ${orderData.total}₽

⏰ Дата: ${orderData.date}
                `;

                for (const adminId of TELEGRAM_ADMIN_IDS) {
                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: adminId,
                            text: text
                        })
                    });
                }
            } catch (error) {
                console.error('Ошибка отправки в Telegram:', error);
            }

            alert('Спасибо! Ваш заказ принят. Скоро с вами свяжутся.');
            cart = [];
            updateCart();
            closeCheckout();
            document.getElementById('checkoutForm').reset();
        }

        // GALLERY NAVIGATION
        let currentSlide = 0;

        function setGallerySlide(index) {
            currentSlide = index;
            const slides = document.getElementById('gallerySlidesmall');
            slides.style.transform = `translateX(${-index * 100}%)`;
            document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        document.getElementById('galleryNext')?.addEventListener('click', () => {
            const maxSlides = products.slice(0, 4).length;
            currentSlide = (currentSlide + 1) % maxSlides;
            setGallerySlide(currentSlide);
        });

        document.getElementById('galleryPrev')?.addEventListener('click', () => {
            const maxSlides = products.slice(0, 4).length;
            currentSlide = (currentSlide - 1 + maxSlides) % maxSlides;
            setGallerySlide(currentSlide);
        });

        // ADMIN PANEL MOVED TO ADMIN.HTML
        // Click the admin icon in nav to access admin.html

        // EVENT LISTENERS
        document.getElementById('cartBtn').addEventListener('click', openCart);
        document.getElementById('wishBtn').addEventListener('click', openWish);
        document.getElementById('menuBtn').addEventListener('click', () => alert('Главное меню (навигация может быть расширена)'));

        // ANIMATION ON SCROLL
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        });

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

        // INIT
        loadProducts();
    </script>
</body>
</html>
