<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Илюша Фларед</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Unbounded', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-danger {
            background: #ff2d55;
            color: #fff;
        }

        .btn-danger:hover {
            background: #e6284c;
        }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            padding: 15px 24px;
            background: none;
            border: none;
            color: #999;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-section {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #fff;
            background: #111;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            border-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #0a0a0a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 18px;
            color: #ff2d55;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 11px;
            color: #999;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-sizes {
            font-size: 11px;
            color: #666;
            margin-bottom: 12px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .product-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-edit {
            background: #333;
            color: #fff;
        }

        .btn-edit:hover {
            background: #444;
        }

        .btn-delete {
            background: #ff2d55;
            color: #fff;
        }

        .btn-delete:hover {
            background: #e6284c;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 20px;
            display: none;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border: 1px solid #333;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
        }

        .modal-close {
            background: none;
            border: none;
            color: #999;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #fff;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #81c784;
        }

        .alert-error {
            background: rgba(255, 45, 85, 0.2);
            border: 1px solid #ff2d55;
            color: #ff6b8a;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #333;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            min-height: 44px;
            align-items: center;
        }

        .tag {
            background: #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag button {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 14px;
        }

        .tag-input input {
            background: none;
            border: none;
            color: #fff;
            outline: none;
            flex: 1;
            min-width: 100px;
            font-family: 'Unbounded', sans-serif;
        }

        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-right {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Админ-панель</h1>
            <div class="header-right">
                <button class="btn btn-secondary" onclick="logout()">Выход</button>
            </div>
        </div>

        <div id="alerts"></div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">Всего товаров</div>
                <div class="stat-value" id="statProducts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Средняя цена</div>
                <div class="stat-value" id="statAvgPrice">0₽</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Самый дорогой</div>
                <div class="stat-value" id="statMaxPrice">0₽</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">📦 Товары</button>
            <button class="tab-btn" onclick="switchTab('add')">➕ Добавить товар</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Настройки</button>
        </div>

        <!-- PRODUCTS TAB -->
        <div id="products-tab" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px; font-weight: 800;">Все товары</h2>
                <input type="text" id="searchInput" class="form-input" placeholder="Поиск товара..." style="max-width: 300px;">
            </div>
            <div class="products-grid" id="productsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <div class="empty-state-text">Загрузка товаров...</div>
                </div>
            </div>
        </div>

        <!-- ADD PRODUCT TAB -->
        <div id="add-tab" class="tab-content">
            <div class="form-section">
                <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Добавить новый товар</h2>
                
                <form id="addProductForm" onsubmit="handleAddProduct(event)">
                    <div class="form-group">
                        <label class="form-label">Название товара *</label>
                        <input type="text" id="productName" class="form-input" required placeholder="Например: Красная куртка">
                    </div>

                    <div class="two-column">
                        <div class="form-group">
                            <label class="form-label">Цена (₽) *</label>
                            <input type="number" id="productPrice" class="form-input" required placeholder="2999" min="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Скидка (%)</label>
                            <input type="number" id="productDiscount" class="form-input" placeholder="0" min="0" max="100">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Описание</label>
                        <textarea id="productDesc" class="form-textarea" placeholder="Опишите товар..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Размеры (добавь через Enter)</label>
                        <div class="tag-input" id="sizesInput">
                            <input type="text" placeholder="XS, S, M, L, XL..." onkeypress="handleTagInput(event, 'sizes')">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Изображения (URL через Enter) *</label>
                        <div class="tag-input" id="imagesInput">
                            <input type="text" placeholder="https://example.com/image.jpg" onkeypress="handleTagInput(event, 'images')">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Категория</label>
                        <select id="productCategory" class="form-select">
                            <option value="other">Другое</option>
                            <option value="clothing">Одежда</option>
                            <option value="shoes">Обувь</option>
                            <option value="accessories">Аксессуары</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Добавить товар</button>
                </form>
            </div>
        </div>

        <!-- SETTINGS TAB -->
        <div id="settings-tab" class="tab-content">
            <div class="form-section">
                <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Настройки</h2>
                
                <div class="form-group">
                    <label class="form-label">Информация о сайте</label>
                    <p style="color: #999; margin-bottom: 20px;">
                        Сайт: <strong>Илюша Фларед</strong><br>
                        БД: <strong>Supabase</strong><br>
                        Telegram бот: <strong>Активен</strong> ✓
                    </p>
                </div>

                <div class="form-group">
                    <label class="form-label">Быстрые действия</label>
                    <button class="btn btn-secondary" onclick="exportProducts()">📥 Экспортировать товары (JSON)</button>
                    <button class="btn btn-secondary" style="margin-top: 10px;" onclick="clearAllProducts()">🗑️ Удалить все товары</button>
                </div>

                <div class="form-group">
                    <label class="form-label">Версия</label>
                    <p style="color: #999;">v1.0 - Илюша Фларед Admin Panel</p>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT PRODUCT MODAL -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Редактировать товар</h2>
                <button class="modal-close" onclick="closeEditModal()">✕</button>
            </div>
            <form id="editProductForm" onsubmit="handleEditProduct(event)">
                <input type="hidden" id="editProductId">
                
                <div class="form-group">
                    <label class="form-label">Название товара</label>
                    <input type="text" id="editProductName" class="form-input" required>
                </div>

                <div class="two-column">
                    <div class="form-group">
                        <label class="form-label">Цена (₽)</label>
                        <input type="number" id="editProductPrice" class="form-input" required min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Скидка (%)</label>
                        <input type="number" id="editProductDiscount" class="form-input" min="0" max="100">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea id="editProductDesc" class="form-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Размеры</label>
                    <div class="tag-input" id="editSizesInput">
                        <input type="text" placeholder="XS, S, M, L..." onkeypress="handleTagInput(event, 'editSizes')">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Сохранить изменения</button>
                <button type="button" class="btn btn-secondary" style="width: 100%; padding: 14px; margin-top: 10px;" onclick="closeEditModal()">Отмена</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gfczuydwmkiyizeurxvu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmY3p1eWR3bWtpeWl6ZXVyeHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDEyNzEsImV4cCI6MjA5NDE3NzI3MX0.vrMf4wMJTk79dlTKtrWsU-xPRLT2Ka30N1FumY4yWeY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let sizes = [];
        let images = [];
        let editSizes = [];

        // INIT
        window.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });

        // LOAD PRODUCTS
        async function loadProducts() {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allProducts = data || [];
                renderProducts(allProducts);
                updateStats();
            } catch (error) {
                showAlert('Ошибка загрузки товаров: ' + error.message, 'error');
            }
        }

        // UPDATE STATS
        function updateStats() {
            document.getElementById('statProducts').textContent = allProducts.length;
            
            if (allProducts.length > 0) {
                const avg = Math.round(allProducts.reduce((sum, p) => sum + p.price, 0) / allProducts.length);
                const max = Math.max(...allProducts.map(p => p.price));
                
                document.getElementById('statAvgPrice').textContent = avg + '₽';
                document.getElementById('statMaxPrice').textContent = max + '₽';
            }
        }

        // RENDER PRODUCTS
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📦</div>
                        <div class="empty-state-text">Товаров нет</div>
                        <p style="color: #666; margin-top: 8px;">Добавь первый товар в таб "Добавить товар"</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                const finalPrice = product.discount ? Math.round(product.price * (1 - product.discount / 100)) : product.price;
                
                card.innerHTML = `
                    <img src="${product.images[0]}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">
                            ${finalPrice}₽
                            ${product.discount ? `<span style="text-decoration: line-through; color: #666; font-size: 14px; margin-left: 8px;">${product.price}₽</span>` : ''}
                        </div>
                        <div class="product-desc">${product.description || 'Нет описания'}</div>
                        <div class="product-sizes">📏 ${product.sizes.join(', ') || 'Размеры не указаны'}</div>
                        <div class="product-actions">
                            <button class="btn-edit" onclick="openEditModal(${product.id})">✏️ Редактировать</button>
                            <button class="btn-delete" onclick="deleteProduct(${product.id})">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // SEARCH PRODUCTS
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.description?.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        });

        // ADD PRODUCT
        async function handleAddProduct(e) {
            e.preventDefault();

            if (images.length === 0) {
                showAlert('Добавь хотя бы одно изображение', 'error');
                return;
            }

            const newProduct = {
                name: document.getElementById('productName').value,
                description: document.getElementById('productDesc').value,
                price: parseInt(document.getElementById('productPrice').value),
                discount: parseInt(document.getElementById('productDiscount').value) || 0,
                sizes: sizes,
                images: images,
                category: document.getElementById('productCategory').value
            };

            try {
                const { data, error } = await supabase
                    .from('products')
                    .insert([newProduct])
                    .select();

                if (error) throw error;
                
                showAlert('Товар успешно добавлен! ✓', 'success');
                document.getElementById('addProductForm').reset();
                sizes = [];
                images = [];
                renderTagInput('sizes');
                renderTagInput('images');
                loadProducts();
                switchTab('products');
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
            }
        }

        // EDIT PRODUCT
        async function openEditModal(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            document.getElementById('editProductId').value = id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editProductDiscount').value = product.discount || 0;
            document.getElementById('editProductDesc').value = product.description || '';
            
            editSizes = [...product.sizes];
            renderTagInput('editSizes');
            
            document.getElementById('editModal').classList.add('open');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('open');
        }

        async function handleEditProduct(e) {
            e.preventDefault();

            const id = parseInt(document.getElementById('editProductId').value);
            const updated = {
                name: document.getElementById('editProductName').value,
                price: parseInt(document.getElementById('editProductPrice').value),
                discount: parseInt(document.getElementById('editProductDiscount').value) || 0,
                description: document.getElementById('editProductDesc').value,
                sizes: editSizes
            };

            try {
                const { error } = await supabase
                    .from('products')
                    .update(updated)
                    .eq('id', id);

                if (error) throw error;
                
                showAlert('Товар обновлен! ✓', 'success');
                closeEditModal();
                loadProducts();
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
            }
        }

        // DELETE PRODUCT
        async function deleteProduct(id) {
            if (!confirm('Удалить товар? Это действие нельзя отменить.')) return;

            try {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                showAlert('Товар удален! ✓', 'success');
                loadProducts();
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
            }
        }

        // CLEAR ALL PRODUCTS
        async function clearAllProducts() {
            if (!confirm('Удалить ВСЕ товары? Это действие нельзя отменить!')) return;
            if (!confirm('Вы уверены? Это удалит все товары из БД!')) return;

            try {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .gte('id', 0);

                if (error) throw error;
                
                showAlert('Все товары удалены!', 'success');
                loadProducts();
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
            }
        }

        // EXPORT PRODUCTS
        function exportProducts() {
            const json = JSON.stringify(allProducts, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `products_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert('Товары экспортированы! ✓', 'success');
        }

        // TAG INPUT
        function handleTagInput(e, type) {
            if (e.key !== 'Enter') return;
            e.preventDefault();

            const input = e.target;
            const value = input.value.trim();
            
            if (!value) return;

            if (type === 'sizes' || type === 'editSizes') {
                const arr = type === 'editSizes' ? editSizes : sizes;
                arr.push(value);
            } else if (type === 'images') {
                images.push(value);
            }

            input.value = '';
            renderTagInput(type);
        }

        function removeTag(type, index) {
            if (type === 'sizes') sizes.splice(index, 1);
            else if (type === 'editSizes') editSizes.splice(index, 1);
            else if (type === 'images') images.splice(index, 1);
            
            renderTagInput(type);
        }

        function renderTagInput(type) {
            const arr = type === 'editSizes' ? editSizes : (type === 'sizes' ? sizes : images);
            const container = document.getElementById(type === 'editSizes' ? 'editSizesInput' : (type === 'sizes' ? 'sizesInput' : 'imagesInput'));
            
            const tags = container.querySelectorAll('.tag');
            tags.forEach(tag => tag.remove());

            arr.forEach((item, index) => {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.innerHTML = `
                    ${item}
                    <button type="button" onclick="removeTag('${type}', ${index})">✕</button>
                `;
                container.insertBefore(tag, container.querySelector('input'));
            });
        }

        // TABS
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // ALERTS
        function showAlert(message, type) {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertsContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 4000);
        }

        // LOGOUT
        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                localStorage.removeItem('adminAuth');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
